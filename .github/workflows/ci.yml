name: CI

# Test results are published via the permission-free Step Summary (no
# check-run API), so no 'checks: write' token grant is required.
on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/**
          if-no-files-found: warn

      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/test-results/testDebugUnitTest/**
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET, os
          files = glob.glob("app/build/test-results/testDebugUnitTest/**/*.xml", recursive=True)
          total=skipped=failed=errored=0
          failures=[]
          for f in files:
              root = ET.parse(f).getroot()
              # Support both <testsuites> wrapper and bare <testsuite>
              suites = root.findall(".//testsuite") if root.tag == "testsuites" else [root]
              for s in suites:
                  total   += int(s.get("tests", 0))
                  skipped += int(s.get("skipped", 0))
                  failed  += int(s.get("failures", 0))
                  errored += int(s.get("errors", 0))
                  for c in s.findall("testcase"):
                      if c.find("failure") is not None or c.find("error") is not None:
                          cls = c.get("classname", "")
                          msg = (c.find("failure") or c.find("error")).get("message", "")
                          failures.append(f"{cls}.{c.get('name')}: {msg}")
          summary = f"## Unit Test Results\n\n"
          summary += f"- Total: **{total}**\n- Skipped: {skipped}\n- Failed: **{failed}**\n- Errors: **{errored}**\n\n"
          if failures:
              summary += "### Failures\n\n"
              for fl in failures[:50]:
                  summary += f"- {fl}\n"
          else:
              summary += "All tests passed :white_check_mark:\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          print(summary)
          PY
